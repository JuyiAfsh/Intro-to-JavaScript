<!DOCTYPE html>
<html>
    <head>
        <title>My Zoo</title>
        <style>
            body {
                font-family: 'Courier New', Courier, monospace;
                background: lightpink;
                text-align: center;
                padding: 25px;
                background-image: url('zooimage1.jpg');
                background-repeat: no-repeat;
                background-size: cover;
            }

            h1 {
                color : rgb(255, 106, 0);
            }

            #zoo {
                border: 2px solid blue;
                width: 300px;
                margin: 16px auto;
                padding: 13px;
                border-radius: 6px;
                background: whitesmoke;
            }

            .zone {
                border: 1px solid blueviolet;
                margin: 6px 0;
                padding: 8px 10px;
                border-radius: 5px;
                text-align: left;
            }

            button {
                background: lightskyblue;
                color: white;
                padding: 15px 20px;
                border: none;
                border-radius: 15px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
         
        <h1>My Zoo</h1>
        <p>Use the javaScript and the DOM to add animals to each cage!</p>

        <div id="zoo">
            <div class="zone">Zone 1: <span id="zone1"></span></div>
            <div class="zone">Zone 2: <span id="zone2"></span></div>
            <div class="zone">Zone 3: <span id="zone3"></span></div>
            <div class="zone">Total Animals: <span id="total"></span></div>
        </div>

        <br>

        <button onclick="openZoo()">Open the Zoo! </button>

        <p id="zoo-status"></p>

        <script>

            function openZoo() {

                document.getElementById("zone1").innerHTML = "Tiger";

                document.getElementById("zone2").innerHTML = "Seal";

                document.getElementById("zone3").innerHTML = "Monkey";

                document.getElementById("total").innerHTML = "3";

                document.getElementById("zoo").style.backgroundColor = "violet";

                document.getElementById("zoo-status").innerHTML = document.title + "is now open!"
            }
        </script>
    </body>
</html>

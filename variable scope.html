<!DOCTYPE html>
<html>
<body>
    <p>A function can access variables defined inside the funtion:</p>
    <button type="button" onclick="myFuntion()">Click Me!</button>

    <p id="demo"></p>
    <script>
        var b = 8;
        function myFuntion() {
            var a = 7;
            document.getElementById("demo").innerHTML = b * a;
        }
    </script>
    </body>
    </html>

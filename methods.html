<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript String Methods</h2>
        <p>Basic Methods</p>
        <script>
            var str = "AmAzInG";
            document.write(str.toUpperCase());
            document.write("<br>Lowercase: ");
            document.write(str.toLowerCase());
            document.write("<br>Does start with i?");
            document.write(str.startsWith('a'));

            var str1 = "I learnt about Methods";
            var test = new RegExp("about");
            var res = test.test(str1);
            document.write("<br>Does str1 contain test?");
            document.write(res);

        </script>
    </body>
    </html>
